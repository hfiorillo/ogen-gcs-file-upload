version: "3"
vars:
  API_SPEC: ./spec.yaml
  API_OUT_DIR: ./internal/fileupload
  GO_MODULE: http-file-upload
tasks:
  install-deps:
    desc: Install required dependencies
    cmds:
      - go install github.com/ogen-go/ogen/cmd/ogen@latest
      - go install github.com/go-task/task/v3/cmd/task@latest
  run:
    desc: Generate and re-build on changes
    cmds:
      - air
  httpyac-csv:
    desc: Run CSV upload API tests with httpyac
    cmds:
      - httpyac send ./http-tests/upload_csv.http --all
  httpyac-xlsx:
    desc: Run XLSX upload API tests with httpyac
    cmds:
      - httpyac send ./http-tests/upload_xlsx.http --all
  httpyac-json:
    desc: Run JSON rejection API tests with httpyac
    cmds:
      - httpyac send ./http-tests/upload_json.http --all
  httpyac-zip:
    desc: Run ZIP rejection API tests with httpyac
    cmds:
      - httpyac send ./http-tests/upload_zip.http --all
  httpyac-all:
    desc: Run all HTTP API tests with httpyac
    cmds:
      - httpyac send ./http-tests/*.http --all
  httpyac:
    desc: Alias for running all HTTP API tests with httpyac
    cmds:
      - task httpyac-all
  generate:
    desc: Generate API client from OpenAPI spec
    cmds:
      - go generate ./...
  generate-watch:
    desc: Watch for changes in the API spec and regenerate
    cmds:
      - task: generate
      - watchexec -e yaml -w {{.API_SPEC}} "task generate"
  build:
    desc: Build the project
    deps: [generate]
    cmds:
      - mkdir -p ./.build
      - go build -o ./.build/server ./cmd/server
      - go build -o ./.build/client ./cmd/client
  test:
    desc: Run tests
    deps: [generate]
    cmds:
      - go test ./...
  lint:
    desc: Run linters
    deps: [generate]
    cmds:
      - golangci-lint run ./...
  all:
    desc: Run all tasks
    deps: [generate, build, test, lint]
